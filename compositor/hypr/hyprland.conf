monitor = eDP-1, preferred, auto, 1
monitor = HDMI-A-1, 1920x1080, auto-up,1


workspace = r[1-999], monitor:eDP-1
workspace = r[1000-1100], monitor:HDMI-A-1
# workspace = 1001, monitor:HDMI-A-1
# workspace = 1002, monitor:HDMI-A-1
# workspace = 1003, monitor:HDMI-A-1

$terminal = alacritty
$fileManager = nautilus
$browser = zen-browser
$vscode = codium
$zed = zeditor

$search = tofi-drun --font /home/remy/.local/share/fonts/FiraCode/FiraCodeNerdFont-Regular.ttf --hint-font false | xargs hyprctl dispatch exec --
$hyprlock = hyprlock
$colorpicker = hyprpicker
$bluetoothctl = bluetoothctl

exec-once = hypridle
exec-once = pactl set-sink-mute @DEFAULT_SINK@ 0
exec-once = wpaperd -d
exec-once = hyprsunset

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# exec-once = gnome-keyring-daemon --start --components=secrets,ssh

exec-once = mako
exec-once = waybar

exec-once = [workspace special:keepass silent] keepassxc
exec-once = [workspace special:obsidian silent] obsidian

env = ELECTRON_OZONE_PLATFORM_HINT,wayland

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0

    # prevents focus loop
    no_focus_fallback = true

    resize_on_border = false
    allow_tearing = false
    # layout = dwindle
    layout = master
}

misc {
    disable_hyprland_logo = true
    enable_anr_dialog = false
    vfr = true
}

ecosystem {
    no_update_news = true
}

debug {
    disable_logs = false
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 14
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }

    shadow {
        enabled = false
        range = 15
        render_power = 5
        color = rgba(0,0,0,.5)
    }
}

animations {
    enabled = false
    bezier = fluid, 0.15, 0.85, 0.25, 1
    bezier = snappy, 0.3, 1, 0.4, 1
    animation = windows, 1, 3, fluid, popin 5%
    animation = windowsOut, 1, 2.5, snappy
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 1.7, snappy, slide
    animation = specialWorkspace, 0, 4, fluid, slidefadevert -35%
    animation = layers, 1, 2, snappy, popin 70%
}

dwindle {
    preserve_split = true
}

input {
    kb_layout = fr

    # 2 moves keyboard focus only when the window is clicked
    follow_mouse = 2
    sensitivity = 0
    force_no_accel = true

    touchpad {
        natural_scroll = true
    }

    touchdevice {
        enabled = false
    }
}

gestures {
    gesture = 3, horizontal, workspace
}


$resize_step = 20
$resize_step_big = 80

$mainMod = SUPER

bind = $mainMod SHIFT, T, exec, (hyprctl getoption input:touchdevice:enabled | grep -q "1" && hyprctl keyword input:touchdevice:enabled 0) || hyprctl keyword input:touchdevice:enabled 1

# OS
bind = $mainMod, ESCAPE, exec, $lock
# bind = $mainMod, P, layoutmsg, swapwithmaster master
bind = $mainMod, P, focusmonitor, HDMI-A-1
bind = $mainMod CTRL, P, focusmonitor, eDP-1
bind = $mainMod SHIFT, P, movetoworkspace, 1000
bind = $mainMod CTRL SHIFT, P, movewindow, m:eDP-1

binde = $mainMod ALT, h, resizeactive, -$resize_step 0
binde = $mainMod ALT, l, resizeactive,  $resize_step 0
binde = $mainMod ALT, k, resizeactive, 0 -$resize_step
binde = $mainMod ALT, j, resizeactive, 0  $resize_step

binde = $mainMod ALT SHIFT, h, resizeactive, -$resize_step_big 0
binde = $mainMod ALT SHIFT, l, resizeactive,  $resize_step_big 0
binde = $mainMod ALT SHIFT, k, resizeactive, 0 -$resize_step_big
binde = $mainMod ALT SHIFT, j, resizeactive, 0  $resize_step_big

binde = $mainMod ALT, left, resizeactive, -$resize_step 0
binde = $mainMod ALT, right, resizeactive,  $resize_step 0
binde = $mainMod ALT, up, resizeactive, 0 -$resize_step
binde = $mainMod ALT, down, resizeactive, 0  $resize_step

binde = $mainMod ALT SHIFT, left, resizeactive, -$resize_step_big 0
binde = $mainMod ALT SHIFT, right, resizeactive,  $resize_step_big 0
binde = $mainMod ALT SHIFT, up, resizeactive, 0 -$resize_step_big
binde = $mainMod ALT SHIFT, down, resizeactive, 0  $resize_step_big


# Special workspaces
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod CTRL, K, togglespecialworkspace, keepass
bind = $mainMod CTRL, O, togglespecialworkspace, obsidian
bind = $mainMod CTRL, B, togglespecialworkspace, beeper


bind = , PRINT, exec, hyprshot -m region -z
bind = $mainMod, Q, killactive
bind = $mainMod, M, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod, TAB, exec, killall -SIGUSR1 waybar
bind = $mainMod SHIFT, W, exec, wpaperctl next-wallpaper
bind = $mainMod SHIFT, D, exec, makoctl mode -t dnd

# Apps
bind = $mainMod, T, exec, $terminal
bind = $mainMod SHIFT, C, exec, $colorpicker -la
bind = $mainMod, C, exec, $vscode
bind = $mainMod SHIFT, Q, exec, [float] $terminal -e "qalc"
# bind = $mainMod SHIFT, A, exec, [float] $terminal -e "tgpt" --interactive --preprompt "Answer with precision, consision and brevity"
bind = $mainMod, Z, exec, $zed
bind = $mainMod, E, exec, $browser
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, SPACE, exec, $search
bind = $mainMod, B, exec, $bluetoothctl

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = ALT, Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev

# Workspace
bind = $mainMod CTRL, right, workspace, r+1
bind = $mainMod CTRL, left, workspace, r-1

# bind = $mainMod CTRL, ampersand, workspace, m~1
# bind = $mainMod CTRL, eacute, workspace, m~2
# bind = $mainMod CTRL, quotedbl, workspace, m~3
# bind = $mainMod CTRL, apostrophe, workspace, m~4
# bind = $mainMod CTRL, parenleft, workspace, m~5
# bind = $mainMod CTRL, minus, workspace, m~6
# bind = $mainMod CTRL, egrave, workspace, m~7
# bind = $mainMod CTRL, underscore, workspace, m~8
# bind = $mainMod CTRL, ccedilla, workspace, m~9
# bind = $mainMod CTRL, agrave, workspace, m~10

bind = $mainMod CTRL, ampersand, exec, ~/.config/hypr/scripts/wsctl switch 0
bind = $mainMod CTRL, eacute,   exec, ~/.config/hypr/scripts/wsctl switch 1
bind = $mainMod CTRL, quotedbl,exec, ~/.config/hypr/scripts/wsctl switch 2
bind = $mainMod CTRL, apostrophe, exec, ~/.config/hypr/scripts/wsctl switch 3
bind = $mainMod CTRL, parenleft, exec, ~/.config/hypr/scripts/wsctl switch 4
bind = $mainMod CTRL, minus,    exec, ~/.config/hypr/scripts/wsctl switch 5
bind = $mainMod CTRL, egrave,   exec, ~/.config/hypr/scripts/wsctl switch 6
bind = $mainMod CTRL, underscore, exec, ~/.config/hypr/scripts/wsctl switch 7
bind = $mainMod CTRL, ccedilla, exec, ~/.config/hypr/scripts/wsctl switch 8
bind = $mainMod CTRL, agrave,   exec, ~/.config/hypr/scripts/wsctl switch 9

bind = $mainMod SHIFT, ampersand, exec, ~/.config/hypr/scripts/wsctl move 0
bind = $mainMod SHIFT, eacute,   exec, ~/.config/hypr/scripts/wsctl move 1
bind = $mainMod SHIFT, quotedbl,exec, ~/.config/hypr/scripts/wsctl move 2
bind = $mainMod SHIFT, apostrophe, exec, ~/.config/hypr/scripts/wsctl move 3
bind = $mainMod SHIFT, parenleft, exec, ~/.config/hypr/scripts/wsctl move 4
bind = $mainMod SHIFT, minus,    exec, ~/.config/hypr/scripts/wsctl move 5
bind = $mainMod SHIFT, egrave,   exec, ~/.config/hypr/scripts/wsctl move 6
bind = $mainMod SHIFT, underscore, exec, ~/.config/hypr/scripts/wsctl move 7
bind = $mainMod SHIFT, ccedilla, exec, ~/.config/hypr/scripts/wsctl move 8
bind = $mainMod SHIFT, agrave,   exec, ~/.config/hypr/scripts/wsctl move 9

bind = $mainMod SHIFT, right, movetoworkspace, r+1
bind = $mainMod SHIFT, left, movetoworkspace, r-1

# Multimedia
## Audio
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = $mainMod SHIFT, L, exec, playerctl next
bindl = $mainMod SHIFT CTRL, L, exec, playerctl position 20+
bindl = $mainMod SHIFT, K, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = $mainMod SHIFT, H, exec, playerctl previous
bindl = $mainMod SHIFT CTRL, H, exec, playerctl position 20-

## Screen
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod CTRL SHIFT, S, movetoworkspace, +0
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

binde=, XF86AudioRaiseVolume, exec, swayosd --output-volume raise
binde=, XF86AudioLowerVolume, exec, exec  swayosd --output-volume lower
bindle=,XF86AudioMute, exec, swayosd --output-volume mute-toggle

layerrule = no_anim on, match:namespace hyprpicker
layerrule = no_anim on, match:namespace selection

# windowrulev2 = ,workspace:name:special:keepass, class:^(org.keepassxc.KeePassXC)$
windowrule {
  name = keep-keepass-away
  match:class = KeePassXC

  workspace = special:keepass
}

windowrule {
  name = keep-beeper-away
  match:class = beepertexts

  workspace = special:beeper
}
